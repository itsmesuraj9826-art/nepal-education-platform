version: '3.9'

services:
  # ── Flask Application ────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nepal_edu_net

  # ── MySQL Database ───────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nepal_edu_net

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nepal_edu_net

  # ── Celery Worker (background jobs: sync, TPDI, dropout risk) ──
  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A app.celery worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
      - redis
    networks:
      - nepal_edu_net

  # ── Celery Beat (scheduled tasks) ────────────────────────
  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A app.celery beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    networks:
      - nepal_edu_net

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - web
    networks:
      - nepal_edu_net

volumes:
  db_data:
  redis_data:
  uploads:

networks:
  nepal_edu_net:
    driver: bridge
